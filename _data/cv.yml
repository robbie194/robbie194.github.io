        location: Nanjing, China
        start_date: 2019-01
        end_date: 2020-03
        highlights:
          - Used structured illumination and a fiber-optic single-pixel receiver for remote imaging.
          - Combined pseudo-inverse reconstruction and compressed sensing to reduce acquisition cost.

